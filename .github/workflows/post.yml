name: Daily Instagram Reel

on:
  schedule:
    # 16:30 UTC = 10:00 PM IST
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Cache fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: fonts
          key: fonts-v1

      - name: Download fonts
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: bash scripts/download_fonts.sh

      - name: Render quote reel
        env:
          IG_HANDLE: ${{ vars.IG_HANDLE }}
        run: python -m src.main render

      - name: Commit rendered reel (so it's reachable at raw.githubusercontent.com)
        run: |
          git config user.name  "inkandexistence-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add posts/ state/_pending.json
          git commit -m "Render daily quote reel [skip ci]" || { echo "Nothing to commit"; exit 0; }
          git push

      - name: Publish to Instagram
        env:
          IG_LONG_LIVED_TOKEN: ${{ secrets.IG_LONG_LIVED_TOKEN }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          IG_APP_ID:           ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET:       ${{ secrets.IG_APP_SECRET }}
          GITHUB_REPO:         ${{ github.repository }}
          GITHUB_BRANCH:       ${{ github.ref_name }}
          IG_HANDLE:           ${{ vars.IG_HANDLE }}
        run: python -m src.main publish

      - name: Commit posted-state log
        run: |
          git add -A state/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Log published quote [skip ci]"
          git push
